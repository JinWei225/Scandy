# Container nginx config. Mirrors deployment/nginx.conf, but serves the frontend
# from the image and proxies to the backend service by its compose name rather
# than to localhost.
server {
    listen 80;
    server_name _;

    # Increase client body size for file uploads
    client_max_body_size 10M;

    # Serve frontend static files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Add headers for better performance
        add_header Cache-Control "public, max-age=3600";
    }

    # Docker's embedded DNS. Needed by the runtime lookup below.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API requests to backend
    location /api/ {
        # Resolved per request rather than once at startup. Using a variable in
        # proxy_pass is what forces that: with a literal hostname nginx caches the
        # backend's IP forever, so rebuilding the backend (which gives it a new IP)
        # would 502 until nginx itself was restarted.
        set $scandy_backend http://backend:5001;
        proxy_pass $scandy_backend$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running requests (OCR processing).
        # Generous because a first scan also pays for loading the model.
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # Error pages
    error_page 404 /index.html;
}
