<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <link rel="icon" href="favicon.ico">
  <title>ScanDy</title>
  <script>
    // Apply the saved theme before the app mounts to avoid a flash of the
    // wrong palette. Dark is the default; themeStore.js keeps this in sync.
    try {
      document.documentElement.classList.add(localStorage.getItem('theme') === 'light' ? 'light' : 'dark');
    } catch (e) {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>

<body class="bg-background text-on-background antialiased min-h-screen flex flex-col font-body selection:bg-primary-container selection:text-on-primary">
  <noscript>
    <strong>We're sorry but ScanDy doesn't work properly without JavaScript enabled. Please enable it to
      continue.</strong>
  </noscript>
  <div id="app"></div>
  <!-- built files will be auto injected -->
</body>

</html>
